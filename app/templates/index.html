<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkify - URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { color: white; font-size: 32px; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.7); margin-bottom: 30px; font-size: 14px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .form { display: none; }
        .form.active { display: block; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        input::placeholder { color: rgba(255,255,255,0.5); }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .error { color: #ff8888; margin-top: 12px; font-size: 14px; display: none; }
        .success { color: #88ff88; margin-top: 12px; font-size: 14px; display: none; }
        .features { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .feature { text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; }
        .feature span { font-size: 24px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔗 Linkify</h1>
        <div class="subtitle">Shorten, Share, Track</div>
        
        <div class="tabs">
            <button class="tab active" id="loginTab">Login</button>
            <button class="tab" id="signupTab">Sign Up</button>
        </div>
        
        <div id="loginForm" class="form active">
            <input type="email" id="loginEmail" placeholder="Email address">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="loginBtn">Login →</button>
            <div id="loginError" class="error"></div>
        </div>
        
        <div id="signupForm" class="form">
            <input type="email" id="signupEmail" placeholder="Email address">
            <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
            <button id="signupBtn">Create Account →</button>
            <div id="signupError" class="error"></div>
            <div id="signupSuccess" class="success"></div>
        </div>
        
        <div class="features">
            <div class="feature"><span>✨</span> Custom Codes</div>
            <div class="feature"><span>📱</span> QR Codes</div>
            <div class="feature"><span>🔒</span> Password Protect</div>
            <div class="feature"><span>📊</span> Analytics</div>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }

        // Tab switching
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('signupTab').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('signupForm').classList.remove('active');
        };
        document.getElementById('signupTab').onclick = () => {
            document.getElementById('signupTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('signupForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
        };

        // Login
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = data.detail || 'Invalid email or password';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        };

        // Signup
        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please fill all fields';
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = 'Account created! Logging you in...';
                    successDiv.style.display = 'block';
                    // Auto login after signup
                    const loginResponse = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const loginData = await loginResponse.json();
                    if (loginResponse.ok) {
                        localStorage.setItem('token', loginData.token);
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 1000);
                    }
                } else {
                    errorDiv.textContent = data.detail || 'Signup failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        };

        // Enter key support
        document.getElementById('loginPassword').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        };
        document.getElementById('signupPassword').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('signupBtn').click();
        };
    </script>
</body>
</html>
